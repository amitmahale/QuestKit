<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuestKit | Turn curiosity into play</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #f6f8fc; color: #0f172a; }
      .wrap { max-width: 1050px; margin: 0 auto; padding: 28px 16px 60px; }
      .hero { background: linear-gradient(130deg,#4f46e5,#1e293b); color: #fff; border-radius: 16px; padding: 22px; }
      .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-top:12px; }
      .card,.panel { background:#fff; border:1px solid #dbe3f0; border-radius:12px; padding:14px; }
      .card { cursor:pointer; }
      .card.active { border-color:#4f46e5; box-shadow:0 8px 20px rgba(79,70,229,.2); }
      form { display:grid; gap:8px; }
      input,select,textarea,button { border:1px solid #cbd5e1; border-radius:8px; padding:8px 10px; font:inherit; }
      button { background:#4f46e5; color:#fff; border-color:#4338ca; cursor:pointer; }
      button:hover { opacity:.94; }
      .two { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:16px; }
      .muted { color:#475569; font-size:.95rem; }
      pre { background:#0f172a; color:#e2e8f0; padding:12px; border-radius:10px; overflow:auto; }
      @media (max-width: 760px){ .two { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>Turn curiosity into play.</h1>
        <p>QuestKit now ships as a full app: register a child, generate activities, complete rounds, and view memory-based callbacks.</p>
      </section>

      <h2>Playable Modes</h2>
      <div class="grid" id="mode-grid"></div>
      <div class="panel" id="mode-detail"><strong>Mode details</strong><p class="muted" id="mode-description"></p></div>

      <section class="two">
        <div class="panel">
          <h3>1) Register child</h3>
          <form id="profile-form">
            <input name="child_id" placeholder="Child ID (ex: kid-1)" required />
            <input name="name" placeholder="Name" required />
            <input name="age" type="number" min="4" max="18" value="10" required />
            <input name="reading_level" value="independent" required />
            <button type="submit">Register</button>
          </form>
          <p class="muted" id="profile-status"></p>
        </div>

        <div class="panel">
          <h3>2) Generate activity</h3>
          <form id="activity-form">
            <input name="child_id" value="kid-1" required />
            <input name="topic" placeholder="Topic (ex: Moon phases)" required />
            <select name="mode" id="mode-select"></select>
            <input name="duration_minutes" type="number" value="8" min="1" />
            <input name="difficulty" type="number" value="3" min="1" max="5" />
            <button type="submit">Generate</button>
          </form>
        </div>
      </section>

      <section class="two">
        <div class="panel">
          <h3>3) Complete activity</h3>
          <form id="complete-form">
            <input name="child_id" value="kid-1" required />
            <input name="activity_id" id="activity-id" placeholder="activity id from generation" required />
            <input name="score" type="number" step="0.1" min="0" max="1" value="0.8" />
            <input name="hint_uses" type="number" min="0" value="1" />
            <button type="submit">Complete session</button>
          </form>
        </div>

        <div class="panel">
          <h3>4) Progress + callbacks</h3>
          <form id="progress-form">
            <input name="child_id" value="kid-1" required />
            <button type="submit">Refresh progress</button>
          </form>
        </div>
      </section>

      <h3>Live output</h3>
      <pre id="output">Ready.</pre>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
